<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 4 - Formulário de Cadastro</title>
    <style type="text/css">@import url("css/styleA04.css");</style>
</head>
<body>
    <!--<div class="form">-->
        <form>
            <h4>Create an Account</h4>
            <input type="text" name="nome" placeholder="Your Name" class="inp"/>
            <input type="text" name="email" placeholder="Your Email" class="inp"/>
            <input type="text" name="senha" placeholder="Password" class="inp"/>
            <input type="text" name="repeat" placeholder="Repeat your password" class="inp"/>
            <div class="terms">
                <input type="checkbox" name="agree" class="chk"/>
                <span>I agree all statements in <a href="" target="">Terms of Service</a></span> 
            </div>    
            <input type="submit" value="Register" class="btn">
            <div class="jtem">
                <span>Have already an acount?</span>
                <a href="" target="">Login here</a>
            </div>
        </form>
    <!--</div>-->
</body>
</html>
