<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 03 - Formulário</title>
    <style type="text/css">@import url("css/style03.css");</style>
</head>
<body>
    <div>  <!--Separa a estrutura HTML em blocos-->
        <form action="" method="">
            <h3>Login</h3><br />

            <div class="linha"></div>
            
            <p class="subt">Seu e-mail</p>
            <input type="email" name="email" placeholder="contato@htmlcsspro.com" class="inp">
            
            <p class="subt">Sua senha</p>
            <input type="password" name="senha" placeholder="1234" class="inp">
            
            <input type="checkbox" name="lembrar" class="chk">
            <span>Manter-me logado</span>

            <input type="submit" value="Logar" class="bttn">
        </form>
        <p class="conta">Ainda não tem conta? <a href="" target="">Cadastre-se</a> </p>
    </div>
</body>
</html>
