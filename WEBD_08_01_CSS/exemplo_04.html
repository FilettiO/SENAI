<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 04 - Formulário</title>
    <style type="text/css">@import url("css/style04.css");</style>
</head>
<body>
        <h2>Contact form</h2>

    <h3>Please fill in your information and we'll be sending your order in no time.</h3>
        <form method="" action="">
            <div class="box">
                <div class="subt">Your Name</div>
                <div class="box_inp">
                    <input type="text" name="fname" placeholder="First Name" class="inp"> 
                    <input type="text" name="lname" placeholder="Last Name" class="inp"><br /><br />
                </div>
            </div>
            <div class="box">
                <div class="subt">Your Email</div>
                <div class="box_inp">
                    <input type="text" name="email" placeholder="e.g.hello@contact.net" class="inp"><br /><br />
                </div> 
            </div>
            <div class="box">
                <div class="subt">Phone*</div>
                <div class="box_inp">
                    <input type="text" name="ddd" placeholder="###" class="inp">
                    <input type="text" name="f1" placeholder="###" class="inp">
                    <input type="text" name="f2" placeholder="###" class="inp"><br /><br />
                </div>
            </div>
            <div class="box">
                <div class="subt">Message Subject*</div>
                <select class="inp">
                    <option value="other">Other</option>
                    <option value="appointment">Appointment</option>
                    <option value="check">Check up</option>
                </select><br /><br />
            </div>
            <div class="box">
                <div class="subt">Message*</div>
                <div class="box_inp">
                    <input type="textarea" name="mes" class="mes inp"><br /><br />
                </div>
            </div>
            <div class="box">
                <div class="subt">Verification*<br /><br /></div>
            </div>
            <div class="box">
                <input type="button" value="SUBMIT FORM">
            </div>
    </form>
  
</body>
</html>
