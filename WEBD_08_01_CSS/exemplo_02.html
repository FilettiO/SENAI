<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 02 - Tabela</title>
    <style type="text/css">@import url("css/style02.css");</style>
</head>
<body>
    <h4>Classificação de Child-Pugh</h4>
    <table>
        <tr>
            <th>Critérios</th>
            <th>1 ponto</th>
            <th>2 pontos</th>
            <th>3 pontos</th>
        </tr>
        <tr>
            <td class="c">Encefalopatia</td>
            <td>Ausente</td>
            <td>Graus I e II</td>
            <td>Graus III e IV</td>
        </tr>
        <tr>
            <td class="c">Ascite</td>
            <td>Ausente</td>
            <td>Pequena</td>
            <td>Volumosa</td>
        </tr>
        <tr>
            <td class="c">INR (RNI)</td>
            <td>&lt 1,7</td>
            <td>1,7 - 2,3</td>
            <td>&gt 2,3</td>
        </tr>
        <tr>
            <td class="c">Bilirrubina total</td>
            <td>&lt 2</td>
            <td>2 - 3</td>
            <td>&gt 3</td>
        </tr>
        <tr>
            <td class="c">Albumina</td>
            <td>&gt 3,5</td>
            <td>2,8 - 3,5</td>
            <td>&lt 2,8</td>
        </tr>
    </table>
</body>
</html>
