<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style type="text/css">
        div{
            color: white;
        }
    </style>

    <title>Trabalhando com Containers</title>
</head>
<body>
    <div class="container bg-dark">container (largura mín. de 540px)</div>
    <div class="container-md bg-primary">container-md (largura mín. de 720px)</div>
    <div class="container-lg bg-danger">container-lg (largura mín. de 960px)</div>
    <div class="container-xl bg-warning">container-xl (largura mín. de 1140px)</div>
    <div class="container-xxl bg-success">container-xxl (largura mín. de 1320px)</div>
    <div class="container-fluid bg-secondary">container-fluid</div>
</body>
</html>
