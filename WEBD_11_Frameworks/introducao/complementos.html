<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style type="text/css">
        
    </style>

    <title>Trabalhando com Complementos</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <!--
                Classes:
                    text-start - alinha o texto à esquerda (horizontal)
                    text-center - alinha o texto ao centro (horizontal)
                    text-end - alinha o texto à direita (horizontal)
            -->
            <div class="col-md-4 bg-info text-start">Texto alinhado à Esquerda</div>
            <div class="col-md-4 bg-warning text-center">Texto alinhado ao Centro</div>
            <div class="col-md-4 bg-success text-end">Texto alinhado à Direita</div>
        </div>
    </div>
</body>
</html>
