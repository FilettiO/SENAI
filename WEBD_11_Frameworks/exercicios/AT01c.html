<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Formulário de Login</title>
</head>
<body class="bg-secondary-subtle">
    <div class="container justify-content-center d-flex align-items-center vh-100">        
        <div class="col-md-5">
            <div class="card p-3 shadow mt-5">
                <h2 class="mb-4 text-center">Login</h2>
                <form>
                    <div class="mb-4">
                        <label>E-Mail</label>
                        <input type="email" class="form-control shadow-none"/>
                    </div>
                    <div class="mb-4">
                        <label>Senha</label>
                        <input type="password" class="form-control shadow-none"/>
                    </div>
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Lembrar-me</label>
                    </div>
                    <button type="button" class="btn btn-danger w-100">Entrar</button>
                </form>
            </div>
        </div>        
    </div>
</body>
</html>
