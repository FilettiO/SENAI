<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Formulário de Cadastro</title>
</head>
<body class="bg-light">
    <div class="container justify-content-center vh-100">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-3 shadow mt-5">
                    <h3 class="mb-4">Cadastro</h3>
                    <form>
                        <div class="mb-4">
                            <label>Nome completo</label>
                            <div class="row">
                                <div class="col"><input type="text" class="form-control" placeholder="Nome"/></div>
                                <div class="col"><input type="text" class="form-control" placeholder="Sobrenome"/></div>
                            </div>
                            
                        </div>
                        <div class="mb-4">
                            <label>E-Mail</label>
                            <input type="email" class="form-control"/>
                        </div>
                        <div class="mb-4">
                            <label>Senha</label>
                            <input type="password" class="form-control"/>
                        </div>
                        <button type="button" class="btn btn-outline-warning w-100">Cadastrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
