<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Formulário de Contato</title>
</head>
<body class="bg-dark">
    <div class="container justify-content-center vh-100">
        <div class="row justify-content-center align-items-center">
            <div class="col-md-6">
                <div class="card p-3 mt-5">
                    <h2 class="mb-4">Entre em Contato</h2>
                    <form>
                        <div class="mb-4">
                            <label>Nome</label>
                            <input type="text" class="form-control"/>
                        </div>
                        <div class="mb-4">
                            <label>E-Mail</label>
                            <input type="email" class="form-control"/>
                        </div>
                        <div class="mb-4">
                            <label>Assunto</label>
                            <input type="text" class="form-control"/>
                        </div>
                        <div class="mb-4">
                            <label>Mensagem</label>
                            <textarea class="form-control"></textarea>
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                            <label class="form-check-label" for="checkDefault">Aceito receber novidades</label>
                        </div>
                        <button type="button" class="bg-secondary border border-secondary float-end rounded-2">Enviar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
